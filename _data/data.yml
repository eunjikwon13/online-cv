career-profile:
    title: Career Profile
    summary: |
      Eunji Kwon received the B.S. degree in mechanical engineering in 2017 
      from Ulsan National Institute of Science and Technology (UNIST), Ulsan,
      South Korea. She is currently pursuing the M.S. dgree in electrical 
      engineering in 2019 from Pohang University of Science and Technology,
      Pohang, South Korea. Her current research interests include MPSoC design
      methodology, system-level power/thermal analysis and management, and 
      power-efficient deep learning neural network architecture. 

